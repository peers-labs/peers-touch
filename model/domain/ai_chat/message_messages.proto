syntax = "proto3";

package peers_touch.model.ai_chat.v1;

import "domain/ai_chat/chat.proto";

option go_package = "github.com/peers-labs/peers-touch/station/app/subserver/ai_chat/model;model";

message SendMessageRequest {
  string session_id = 1;
  string topic_id = 2;
  string content = 3;
  repeated MessageAttachment attachments = 4;
  string metadata_json = 5;
  bool stream = 6;
}

message SendMessageResponse {
  ChatMessage user_message = 1;
  ChatMessage assistant_message = 2;
  bool accepted = 3;
}

message ListMessagesRequest {
  string session_id = 1;
  string topic_id = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListMessagesResponse {
  repeated ChatMessage messages = 1;
  string next_page_token = 2;
}

message GetMessageRequest {
  string message_id = 1;
}

message GetMessageResponse {
  ChatMessage message = 1;
}

message DeleteMessageRequest {
  string message_id = 1;
}

message DeleteMessageResponse {
  bool success = 1;
}
